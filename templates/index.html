<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Legal Search System</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary-color: #1a73e8;
            /* Google Blue */
            --secondary-color: #34a853;
            /* Google Green */
            --text-color: #3c4043;
            --background-color: #f7f9fc;
            --card-background: #ffffff;
            --border-color: #dadce0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: var(--background-color);
            color: var(--text-color);
        }

        .container {
            max-width: 650px;
            margin: 70px auto;
            background: var(--card-background);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            border-top: 5px solid var(--primary-color);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Input and Select Styling */
        label {
            font-weight: 500;
            margin-top: 18px;
            margin-bottom: 5px;
            display: block;
            color: #5f6368;
            font-size: 0.95em;
        }

        input[type=text],
        select {
            width: 100%;
            padding: 14px 15px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type=text]:focus,
        select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 1px var(--primary-color);
            outline: none;
        }

        /* Filter Source Dropdown */
        #filter-select-group {
            margin-top: 25px;
        }

        /* Radio Buttons for Mode */
        .options {
            margin-top: 25px;
            padding: 15px;
            background: #f1f3f4;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .options label {
            font-weight: 400;
            margin-top: 8px;
            display: inline-block;
            margin-right: 20px;
        }

        /* Button Styling */
        .btn {
            margin-top: 35px;
            padding: 14px 25px;
            background: var(--primary-color);
            color: white;
            border: none;
            font-size: 1.05em;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background: #1565c0;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>

    <div class="container">
        <h2><i class="fas fa-gavel" style="margin-right: 10px; color: var(--secondary-color);"></i>Legal Retrieval
            System</h2>

        <form action="/search" method="POST">

            <label for="query-input">Enter Query:</label>
            <input type="text" id="query-input" name="query" required
                placeholder="e.g., 'What is judicial review in 2023 by a full bench?'">

            <div id="filter-select-group">
                <label for="filter-source-select">Filter Configuration:</label>
                <select id="filter-source-select" name="filter_source" onchange="toggleFilterFields(this.value)">
                    <option value="auto" selected>Auto-Extract from Query (Recommended)</option>
                    <option value="manual">Enter Year & Bench Manually</option>
                </select>
            </div>

            <div id="manual_filters" style="display: none;">
                <label>Year:</label>
                <input type="text" name="year" placeholder="e.g., 2023">

                <label>Bench:</label>
                <input type="text" name="bench" placeholder="e.g., Court No. 5, Division Bench">
            </div>

            <label style="margin-top: 30px;">Search Output Mode:</label>
            <div class="options">
                <label><input type="radio" name="mode" value="docs" checked> <i class="fas fa-file-alt"></i> Show
                    Retrieved Documents</label>
                <label><input type="radio" name="mode" value="rag"> <i class="fas fa-robot"></i> Generate Summarized
                    Answer (RAG)</label>
            </div>

            <button class="btn" type="submit"><i class="fas fa-search"></i> Search Judgments</button>
        </form>
    </div>

    <script>
        // Function to toggle the visibility of manual filter fields
        function toggleFilterFields(source) {
            const manualFilters = document.getElementById('manual_filters');
            if (source === 'manual') {
                manualFilters.style.display = 'block';
            } else {
                manualFilters.style.display = 'none';
            }
        }

        // Set initial state on load
        document.addEventListener('DOMContentLoaded', () => {
            // Read the current value of the select menu to set the initial visibility
            const selectElement = document.getElementById('filter-source-select');
            toggleFilterFields(selectElement.value);
        });
    </script>

</body>

</html>
