<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #eef1f5;
        }
        .container {
            max-width: 650px;
            margin: 70px auto;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }
        label {
            font-weight: 500;
            margin-top: 12px;
            display: block;
        }
        input[type=text], select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fafafa;
        }
        .options {
            margin-top: 15px;
            padding: 10px 0;
        }
        .btn {
            margin-top: 25px;
            padding: 12px 25px;
            background: #007BFF;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Information Retrieval System</h2>

    <form action="/search" method="POST">

        <label>Enter Query:</label>
        <input type="text" name="query" required placeholder="Type your question...">

        <label>Year:</label>
        <input type="text" name="year" placeholder="e.g., 2023">

        <label>Bench:</label>
        <input type="text" name="bench" placeholder="e.g., Court No. 5">

        <div class="options">
            <label><input type="radio" name="mode" value="docs" checked> Show Retrieved Documents</label><br>
            <label><input type="radio" name="mode" value="rag"> Generate Short Answer (RAG)</label>
        </div>

        <button class="btn" type="submit">Search</button>
    </form>
</div>

</body>
</html>
