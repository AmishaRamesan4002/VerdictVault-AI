<!DOCTYPE html>
<html>
<head>
    <title>Search System</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f8f8f8; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; }
        input[type=text] { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #aaa; }
        .options { margin-top: 15px; }
        .btn { margin-top: 20px; padding: 10px 20px; background: #007BFF; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>Information Retrieval System</h2>
    <form action="/search" method="POST">
        <label>Enter Query:</label>
        <input type="text" name="query" required>

        <div class="options">
            <label><input type="radio" name="mode" value="docs" checked> Show Retrieved Documents</label><br>
            <label><input type="radio" name="mode" value="rag"> Generate Short Answer (RAG)</label>
        </div>

        <button class="btn" type="submit">Search</button>
    </form>
</div>

</body>
</html>
